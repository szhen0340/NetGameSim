# Medium graph configuration (500 nodes)
# Override default application.conf settings for a medium experiment
# Usage: java -Dconfig.file=configs/medium.conf -jar target/scala-3.2.2/netmodelsim.jar outputs/medium_graph

NGSimulator {
    seed = 100
    outputDirectory = "outputs"
    NetModel {
        statesTotal = 500
        edgeProbability = 0.001
        desiredReachabilityCoverage = 1.0
        maxBranchingFactor = 7
        maxDepth = 5
        maxProperties = 20
        propValueRange = 100
        actionType = 20
        actionRange = 10
        connectedness = 2
        perturbationCoefficient = 0.3
        dissimulationCoefficient = 0.15
        distanceCoefficient = 0.2
        distanceSpreadThreshold = 0.05
        numberOfExperiments = 100
        numberOfWalks = 50
        maxWalkPathLengthCoeff = 2
        graphWalkTerminationPolicy = ${NGSimulator.Constants.MaxPathLength}
        graphWalkNodeTerminationProbability = 0.001d
        valuableDataProbability = 0.001d
    }
    CostRewards {
        malAppBudget = 2700.0
        costOfDetection = 0.2d
        serviceRewardProbability = 0.3
        serviceReward = 10d
        servicePenalty = 3d
        targetAppScore = 5
        targetAppLowPenalty = 1
        targetAppHighPenalty = 2
    }
    Constants {
        MaxPathLength = "maxpathlength"
        UntilCycle = "untilcycle"
        All = "all"
    }
    Graph {
        directionality = "directed"
        fileName = "medium_graph.ngs"
        outputPath = "./converted"
        graphLocation = "../../../"
    }
    OutputGraphRepresentation {
        contentType = "json"
    }
}
